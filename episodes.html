<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Episode - Michie Hots</title>
    <style>
        :root { --bg: #0a0a0a; --bg-sec: #141414; --red: #E50914; --gray: #aaa; --sidebar-w: 75px; --sidebar-expanded-w: 240px; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden;}
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        .app-container { display: flex; min-height: 100vh; }
        
        /* --- SIDEBAR PC --- */
        .sidebar { display: none; width: var(--sidebar-w); background: var(--bg-sec); flex-direction: column; padding: 25px 0; position: fixed; height: 100vh; border-right: 1px solid #222; z-index: 100; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; white-space: nowrap; }
        .sidebar.expanded { width: var(--sidebar-expanded-w); }
        .menu-toggle { color: #fff; cursor: pointer; margin: 0 25px 40px 25px; transition: 0.2s; display: inline-flex; }
        .menu-toggle:hover { color: var(--red); }
        .nav-menu { display: flex; flex-direction: column; gap: 10px; width: 100%; padding: 0 15px; }
        .nav-link { display: flex; align-items: center; color: var(--gray); font-size: 1.05rem; padding: 12px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover { background: #2a2a2a; color: #fff; }
        .nav-icon { min-width: 25px; display: flex; justify-content: center; align-items: center; }
        .nav-text { margin-left: 15px; font-weight: 500; opacity: 0; transition: opacity 0.2s; display: none; }
        .sidebar.expanded .nav-text { display: block; opacity: 1; }

        .main-content { flex: 1; width: 100%; transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- MOBILE TOP BAR --- */
        .top-bar-mobile { position: fixed; top:0; width:100%; padding: 15px 20px; z-index: 20; display: flex; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .back-btn { background: rgba(20,20,20,0.7); color: #fff; border: 1px solid #333; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .back-btn:hover { background: var(--red); border-color: var(--red); }
        
        /* --- BANNER SERIES --- */
        .series-banner { height: 55vh; background-size: cover; background-position: center 20%; position: relative; display: flex; align-items: flex-end; padding: 30px; }
        .series-banner::after { content:''; position:absolute; inset:0; background: linear-gradient(to top, var(--bg) 0%, transparent 80%); z-index: 1; }
        .banner-info { position: relative; z-index: 2; width: 100%; max-width: 800px; }
        .s-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
        .s-meta { display: flex; gap: 12px; color: #ddd; font-weight: 600; margin-bottom: 20px; font-size: 0.95rem; align-items: center;}
        .match-score { color: #46d369; }
        .age-rating { border: 1px solid #888; padding: 2px 6px; border-radius: 4px; }
        
        .btn-play-main { background: #fff; color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-play-main:hover { background: #ddd; transform: scale(1.05); }

        /* --- EPISODE GRID --- */
        .ep-section { padding: 30px 20px; position: relative; z-index: 5; margin-top: -20px;}
        .ep-header { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 15px;}
        
        .ep-grid { display: grid; gap: 15px; grid-template-columns: 1fr; }
        .ep-card { display: flex; background: #111; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; position: relative; }
        .ep-card:hover { border-color: #555; background: #1a1a1a; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.6);}
        
        .ep-thumb { width: 140px; background: #000; position: relative; flex-shrink: 0; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s;}
        .ep-card:hover .ep-thumb img { opacity: 1; }
        
        .play-icon-overlay { position: absolute; inset:0; display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.3); }
        .ep-card:hover .play-icon-overlay { opacity: 1; }
        .play-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); }
        
        .ep-num-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.85); padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; letter-spacing: 1px; color: #fff; }
        
        .ep-details { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .ep-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; color: #fff;}
        .ep-desc { font-size: 0.85rem; color: #888; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}

        @media (min-width: 768px) {
            .sidebar { display: flex; }
            .top-bar-mobile { display: none; }
            .main-content { margin-left: var(--sidebar-w); }
            .sidebar.expanded + .main-content { margin-left: var(--sidebar-expanded-w); }
            .series-banner { height: 65vh; padding: 50px 40px; }
            .s-title { font-size: 4.5rem; }
            .ep-section { padding: 40px; }
            .ep-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        }
    </style>
</head>

            michlite: [ 'https://drive.google.com/file/d/1Rnz0OV3pbaMFP_ahvp9Hb335eMBLlE6r/preview', 'https://drive.google.com/file/d/1UqhJUHnizPumjh24hJ-JRdPrvOZo2p4f/preview', 'https://drive.google.com/file/d/1UNAnRkAINgSv68RNFeangM46CwAOJt_z/preview', 'https://drive.google.com/file/d/1Trv0RbxYkXbUH7KGOrwoKy7ycg2DEEB_/preview', 'https://drive.google.com/file/d/1YUVeelTkQKsaqj2osyp8ja8QmHwDWqC7/preview' ],

        };

        const catId = localStorage.getItem('selectedCategoryId') || 'michooy';
        const catName = localStorage.getItem('selectedCategoryName') || 'Michooy Series';
        const catImg = localStorage.getItem('selectedCategoryImg') || 'https://files.catbox.moe/veo8xt.jpg';

        document.getElementById('sTitle').innerText = catName;
        document.getElementById('bannerBg').style.backgroundImage = `url('${catImg}')`;

        // FILTER YANG BIKIN SINKRON SAMA PLAYER
        const rawEps = animeEpisodes[catId] || [];
        const validEps = rawEps.filter(link => link && link.trim() !== '');

        document.getElementById('sMetaCount').innerText = `${validEps.length} Episodes`;

        const grid = document.getElementById('epGrid');
        
        // Loop langsung pakai validEps, index otomatis pas 1:1 sama player.html
        validEps.forEach((link, index) => {
            const div = document.createElement('div');
            div.className = 'ep-card';
            div.innerHTML = `
                <div class="ep-thumb">
                    <div class="ep-num-badge">EP ${index + 1}</div>
                    <img src="${catImg}" loading="lazy">
                    <div class="play-icon-overlay">
                        <div class="play-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
                    </div>
                </div>
                <div class="ep-details">
                    <div class="ep-title">Episode ${index + 1}</div>
                    <div class="ep-desc">Streaming episode ${index + 1} dari ${catName} sekarang juga.</div>
                </div>
            `;
            // KUNCI FIX BUG: index yang dilempar sama dengan letak aslinya
            div.onclick = () => {
                localStorage.setItem('targetEpisodeIndex', index);
                window.location.href = 'player.html';
            };
            grid.appendChild(div);
        });

        function playFirst() {
            if(validEps.length > 0) {
                localStorage.setItem('targetEpisodeIndex', 0);
                window.location.href = 'player.html';
            }
        }
    </script>
</body>
</html>
