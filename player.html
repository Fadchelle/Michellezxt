<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Michie Hots</title>
    <style>
        :root { --bg: #0a0a0a; --bg-sec: #141414; --red: #E50914; --gray: #aaa; --sidebar-w: 75px; --sidebar-expanded-w: 240px; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent;}

        /* --- SIDEBAR PC --- */
        .sidebar { display: none; width: var(--sidebar-w); background: #000; flex-direction: column; padding: 25px 0; border-right: 1px solid #222; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; white-space: nowrap; z-index: 100;}
        .sidebar.expanded { width: var(--sidebar-expanded-w); }
        .menu-toggle { color: #fff; cursor: pointer; margin: 0 25px 40px 25px; transition: 0.2s; display: inline-flex; }
        .menu-toggle:hover { color: var(--red); }
        .nav-menu { display: flex; flex-direction: column; gap: 10px; width: 100%; padding: 0 15px; }
        .nav-link { display: flex; align-items: center; color: var(--gray); font-size: 1.05rem; padding: 12px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover { background: #222; color: #fff; }
        .nav-icon { min-width: 25px; display: flex; justify-content: center; align-items: center; }
        .nav-text { margin-left: 15px; font-weight: 500; opacity: 0; transition: opacity 0.2s; display: none; }
        .sidebar.expanded .nav-text { display: block; opacity: 1; }

        /* --- AREA UTAMA --- */
        .main-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; width: 100%; background: var(--bg-sec);}
        .main-area::-webkit-scrollbar { display: none; }
        
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;}
        .video-wrapper iframe { width: 100%; height: 100%; border: none; }
        .btn-back-mobile { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #333; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); z-index: 20; transition: 0.2s;}
        .btn-back-mobile:hover { background: var(--red); border-color: var(--red);}

        /* --- KONTEN BAWAH VIDEO --- */
        .content-area { padding: 25px 20px; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%;}
        .v-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; color: #fff; letter-spacing: 0.5px;}
        .v-ep { color: var(--gray); font-weight: 600; margin-bottom: 25px; font-size: 1rem; display: flex; align-items: center; gap: 10px;}
        .v-badge { background: #333; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;}

        .tabs { display: flex; gap: 30px; border-bottom: 1px solid #333; margin-bottom: 25px; }
        .tab { padding: 10px 0; color: #777; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; font-size: 1.05rem;}
        .tab.active { color: #fff; border-bottom-color: var(--red); }
        .tab:hover { color: #ddd; }

        /* --- LIST EPISODE --- */
        .grid-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .box-card { display: flex; background: #1a1a1a; border-radius: 8px; cursor: pointer; overflow: hidden; border: 1px solid transparent; transition: 0.2s; align-items: center;}
        .box-card:hover { background: #222; border-color: #555; transform: translateY(-2px);}
        .box-card.active { border-color: var(--red); background: rgba(229,9,20,0.1); }
        
        .box-num { width: 50px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 1.4rem; color: #555; }
        .box-card.active .box-num { color: var(--red); }
        .box-info { padding: 15px 15px 15px 0; flex: 1; }
        .box-title { font-weight: 700; margin-bottom: 4px; font-size: 1.05rem;}
        .box-card.active .box-title { color: #fff; }
        .box-play-icon { color: var(--red); display: flex; align-items: center; padding-right: 20px;}

        /* --- GRID SERIES LAIN --- */
        .series-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .s-card { aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; transition: 0.3s; border: 1px solid transparent;}
        .s-card:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.3); box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .s-card img { width: 100%; height: 100%; object-fit: cover; }
        .s-card-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 15px 5px 10px; text-align: center; font-size: 0.85rem; font-weight: bold; }

        @media (min-width: 768px) {
            .sidebar { display: flex; }
            .btn-back-mobile { display: none; }
            .video-wrapper { max-height: 75vh; }
            .content-area { padding: 40px; }
            .v-title { font-size: 2.5rem; }
            .grid-list { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
            .series-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px;}
        }
    </style>
</head>

            michlite: [ 'https://drive.google.com/file/d/1Rnz0OV3pbaMFP_ahvp9Hb335eMBLlE6r/preview', 'https://drive.google.com/file/d/1UqhJUHnizPumjh24hJ-JRdPrvOZo2p4f/preview', 'https://drive.google.com/file/d/1UNAnRkAINgSv68RNFeangM46CwAOJt_z/preview', 'https://drive.google.com/file/d/1Trv0RbxYkXbUH7KGOrwoKy7ycg2DEEB_/preview', 'https://drive.google.com/file/d/1YUVeelTkQKsaqj2osyp8ja8QmHwDWqC7/preview' ],
            michsnap: [ 'https://drive.google.com/file/d/1RkP6d0BjUuN3lmVA9j2SkouwnBRZ3cHn/preview', 'https://drive.google.com/file/d/1UqdoXsGY-HR6TObsGeYF6_wakfXL4eSr/preview', 'https://drive.google.com/file/d/1UMEQ_vc1b8vdxFRM4CQQnmdUo4UWt_5L/preview', 'https://drive.google.com/file/d/1TqsJs1JzhkbU7cc8j6fEawDwjEmXA3Cz/preview', 'https://drive.google.com/file/d/1YQz-eaFw0Vo6wJLd9GZXHriS3P8CQ9xa/preview' ]
        };

        const allCats = [
            { id: 'michooy', name: 'Michooy', img: 'https://files.catbox.moe/dnyaor.jpg' }, { id: 'michelles', name: 'Michelles', img: 'https://files.catbox.moe/ibj4a2.jpg' }, { id: 'michoooos', name: 'Michoooos', img: 'https://files.catbox.moe/m2hd2v.jpeg' }, { id: 'michsx', name: 'Michsx', img: 'https://files.catbox.moe/4tjwfo.jpeg' }, { id: 'michahhs', name: 'Michahhs', img: 'https://files.catbox.moe/fgynpk.jpeg' }, { id: 'michneo', name: 'Michneo', img: 'https://files.catbox.moe/skijvp.jpg' }, { id: 'michraw', name: 'Michraw', img: 'https://files.catbox.moe/cvstos.jpg' }, { id: 'michsnap', name: 'Michsnap', img: 'https://files.catbox.moe/wslozw.jpg' }, { id: 'ngabalex', name: 'Ngabalex', img: 'https://files.catbox.moe/x0u6wh.jpg' }, { id: 'mecistop', name: 'Mecistop', img: 'https://files.catbox.moe/jrtpe5.jpg' }, { id: 'cece', name: 'Cece', img: 'https://files.catbox.moe/u7sd04.jpg' }, { id: 'michieer', name: 'Michieer', img: 'https://files.catbox.moe/yua9ji.jpg' }, { id: 'michdream', name: 'Michdream', img: 'https://files.catbox.moe/6c82hz.jpg' }, { id: 'michdark', name: 'Michdark', img: 'https://files.catbox.moe/labdhh.jpg' }, { id: 'michlite', name: 'Michlite', img: 'https://files.catbox.moe/ttohcw.jpg' }
        ];

        let cId = localStorage.getItem('selectedCategoryId') || 'michooy';
        let cName = localStorage.getItem('selectedCategoryName') || 'Michooy';
        let epIdx = parseInt(localStorage.getItem('targetEpisodeIndex')) || 0;

        function loadPlayer() {
            document.getElementById('vTitle').innerText = cName;
            document.getElementById('vEpText').innerText = `Episode ${epIdx + 1}`;
            
            // FILTER YANG BIKIN SINKRON
            const rawEps = animeEpisodes[cId] || [];
            const validEps = rawEps.filter(link => link && link.trim() !== '');

            if(validEps[epIdx]) {
                document.getElementById('videoPlayer').src = validEps[epIdx];
            }
            
            renderEps(validEps);
            renderMore();
        }

        function renderEps(validEps) {
            const list = document.getElementById('viewEps');
            list.innerHTML = '';

            validEps.forEach((link, index) => {
                const div = document.createElement('div');
                div.className = 'box-card' + (index === epIdx ? ' active' : '');
                div.innerHTML = `
                    <div class="box-num">${index + 1}</div>
                    <div class="box-info">
                        <div class="box-title">Episode ${index + 1}</div>
                        <div style="font-size:0.85rem; color:#888;">${index === epIdx ? 'Sedang Diputar' : 'Tersedia'}</div>
                    </div>
                    ${index === epIdx ? '<div class="box-play-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>' : ''}
                `;
                // KUNCI FIX BUG: index dikirim persis
                div.onclick = () => {
                    epIdx = index;
                    localStorage.setItem('targetEpisodeIndex', index);
                    loadPlayer();
                };
                list.appendChild(div);
            });
        }

        function renderMore() {
            const grid = document.getElementById('viewMore');
            grid.innerHTML = '';
            
            allCats.forEach(cat => {
                if(cat.id === cId) return; 
                const div = document.createElement('div');
                div.className = 's-card';
                div.innerHTML = `<img src="${cat.img}" loading="lazy"><div class="s-card-name">${cat.name}</div>`;
                div.onclick = () => {
                    cId = cat.id; cName = cat.name; epIdx = 0;
                    localStorage.setItem('selectedCategoryId', cat.id);
                    localStorage.setItem('selectedCategoryName', cat.name);
                    localStorage.setItem('selectedCategoryImg', cat.img);
                    localStorage.setItem('targetEpisodeIndex', 0);
                    switchTab('eps'); loadPlayer();
                };
                grid.appendChild(div);
            });
        }

        function switchTab(t) {
            if (t === 'eps') {
                document.getElementById('tabEps').classList.add('active');
                document.getElementById('tabMore').classList.remove('active');
                document.getElementById('viewEps').style.display = 'grid';
                document.getElementById('viewMore').style.display = 'none';
            } else {
                document.getElementById('tabMore').classList.add('active');
                document.getElementById('tabEps').classList.remove('active');
                document.getElementById('viewMore').style.display = 'grid';
                document.getElementById('viewEps').style.display = 'none';
            }
        }

        loadPlayer();
    </script>
</body>
